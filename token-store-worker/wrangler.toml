name = "cogflow-token-store"
main = "src/index.js"
compatibility_date = "2025-02-15"

# Bind a KV namespace named COGFLOW_CONFIGS
# Create it with:
#   wrangler kv namespace create COGFLOW_CONFIGS
#   wrangler kv namespace create COGFLOW_CONFIGS --preview
# Then paste the generated IDs below.

[[kv_namespaces]]
binding = "COGFLOW_CONFIGS"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# R2 bucket for binary assets (images/audio/etc.)
# Create it in the Cloudflare Dashboard → R2 → Create bucket.
[[r2_buckets]]
binding = "COGFLOW_ASSETS"
bucket_name = "cogflow-assets"

[vars]
# Conservative defaults (can be overridden in Dashboard → Worker → Settings → Variables)
# Max bytes per individual asset upload
MAX_ASSET_BYTES_PER_FILE = "10485760" # 10MB
# Max total asset bytes per config_id
MAX_ASSET_BYTES_PER_CONFIG = "104857600" # 100MB
